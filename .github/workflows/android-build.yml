name: Android Firebase App Distribution

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    name: Build, Version, Tag and Upload to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Generate Next Version Tag
        run: |
          git fetch --tags

          LAST_TAG=$(git tag --list "v1.*.*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION=${LAST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            if [ "$PATCH" -lt 99 ]; then
              PATCH=$((PATCH + 1))
            else
              PATCH=0
              MINOR=$((MINOR + 1))
            fi

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "New version tag: $NEW_TAG"

      - name: Update Android App Version
        run: |
          VERSION_NAME=${NEW_TAG#v}
          VERSION_CODE=${{ github.run_number }}

          perl -i -pe "s/versionName = \".*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
          perl -i -pe "s/versionCode = [0-9]+/versionCode = $VERSION_CODE/" app/build.gradle.kts

          grep -n "versionName\|versionCode" app/build.gradle.kts

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Verify APK Exists
        run: |
          ls -lah app/build/outputs/apk/debug/

          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK NOT FOUND"
            exit 1
          fi

          echo "APK FOUND SUCCESSFULLY"

      - name: Upload APK Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ env.NEW_TAG }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Restore Firebase Service Account
        run: |
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase-service-account.json

      - name: Upload to Firebase App Distribution
        run: bundle exec fastlane android firebase_distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RELEASE_VERSION: ${{ env.NEW_TAG }}

      - name: Commit Version Update
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/build.gradle.kts
          git commit -m "chore: release $NEW_TAG" || echo "No changes to commit"
          git push origin main

      - name: Create and Push Git Tag
        if: success()
        run: |
          git tag $NEW_TAG
          git push origin $NEW_TAG
