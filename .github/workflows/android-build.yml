name: Android Firebase App Distribution

on:
  push:
    branches:
      - main

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install
          
      - name: Verify APK Exists
        run: |
          echo "Checking APK..."
          ls -lah app/build/outputs/apk/debug/

          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK FOUND SUCCESSFULLY"
          else
            echo "APK NOT FOUND"
            exit 1
          fi
          
      - name: Upload APK Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          
      - name: Restore Firebase Service Account
        run: |
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase-service-account.json

      - name: Build and Upload to Firebase App Distribution
        run: bundle exec fastlane android firebase_distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}



